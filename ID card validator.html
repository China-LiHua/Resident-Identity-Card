<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>中国居民身份证号码验证工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #f5f7fa 0%, #e9edf5 100%);
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 40px 44px 48px;
            max-width: 620px;
            width: 100%;
            box-shadow:
                0 20px 60px rgba(0, 20, 40, 0.12),
                0 8px 24px rgba(0, 0, 0, 0.04),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: box-shadow 0.3s ease;
            position: relative;
        }

        .card:hover {
            box-shadow:
                0 30px 80px rgba(0, 20, 40, 0.16),
                0 10px 32px rgba(0, 0, 0, 0.06);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 30px;
        }

        .header-icon {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .header-icon svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #0b1e33;
            letter-spacing: 0.5px;
            line-height: 1.2;
        }

        .header .sub {
            font-size: 14px;
            font-weight: 400;
            color: #5a6e87;
            display: block;
            margin-top: 2px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .input-group label {
            font-size: 15px;
            font-weight: 600;
            color: #1f3349;
            letter-spacing: 0.3px;
        }

        .input-row {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .input-row input {
            flex: 1;
            min-width: 200px;
            padding: 14px 18px;
            border: 2px solid #dce2ec;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 2px;
            background: white;
            color: #0b1e33;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s, opacity 0.3s;
            font-family: 'SF Mono', 'Menlo', monospace;
        }

        .input-row input:focus {
            border-color: #2d5a9b;
            box-shadow: 0 0 0 4px rgba(45, 90, 155, 0.12);
        }

        .input-row input::placeholder {
            font-weight: 400;
            letter-spacing: 0.5px;
            color: #a8b8cc;
            font-family: 'Segoe UI', 'PingFang SC', sans-serif;
        }

        .input-row input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .input-row button {
            padding: 14px 32px;
            background: linear-gradient(135deg, #2d5a9b, #1a3a6b);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.25s, opacity 0.3s;
            box-shadow: 0 8px 20px rgba(26, 58, 107, 0.25);
            white-space: nowrap;
            letter-spacing: 0.5px;
        }

        .input-row button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(26, 58, 107, 0.35);
        }

        .input-row button:active:not(:disabled) {
            transform: translateY(0px);
            box-shadow: 0 4px 12px rgba(26, 58, 107, 0.2);
        }

        .input-row button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result-area {
            margin-top: 28px;
            border-top: 2px solid rgba(0, 0, 0, 0.04);
            padding-top: 24px;
            min-height: 80px;
        }

        .result-status {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px 20px;
            border-radius: 16px;
            font-size: 32px;
            margin-bottom: 12px;
            transition: background 0.25s, color 0.25s;
        }

        .result-status.valid {
            background: #e6f4e9;
            border: 1px solid #b8dec4;
        }

        .result-status.invalid {
            background: #fdeaea;
            border: 1px solid #f5c8c8;
        }

        .result-status.idle {
            background: transparent;
            border: none;
            padding: 0;
            min-height: 40px;
        }

        .id-info {
            display: none;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.35s ease, visibility 0.35s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-box {
            background: white;
            border-radius: 28px;
            padding: 40px 44px 44px;
            max-width: 440px;
            width: 90%;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.25);
            transform: scale(0.92) translateY(12px);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.35s ease;
            opacity: 0;
            text-align: center;
        }

        .modal-overlay.active .modal-box {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        .modal-view {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .modal-view.active {
            display: flex;
        }

        .modal-icon {
            font-size: 48px;
            margin-bottom: 12px;
            display: block;
        }

        .spinner-ring {
            width: 72px;
            height: 72px;
            margin-bottom: 12px;
            animation: spin 1.2s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .modal-title {
            font-size: 22px;
            font-weight: 700;
            color: #0b1e33;
            margin-bottom: 6px;
        }

        .modal-sub {
            font-size: 15px;
            color: #5a6e87;
            margin-bottom: 16px;
            font-weight: 400;
        }

        .modal-detail {
            width: 100%;
            text-align: left;
            margin: 8px 0 16px;
            padding: 12px 16px;
            background: #f8faff;
            border-radius: 12px;
            border: 1px solid #e9edf5;
        }

        .modal-detail .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 15px;
            border-bottom: 1px solid #eef2f7;
        }

        .modal-detail .detail-item:last-child {
            border-bottom: none;
        }

        .modal-detail .detail-label {
            color: #7a8ea5;
            font-weight: 500;
        }

        .modal-detail .detail-value {
            color: #0b1e33;
            font-weight: 600;
        }

        .result-error-list {
            text-align: left;
            margin: 8px 0 16px;
            padding: 0 4px;
            width: 100%;
        }

        .result-error-list .error-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 0;
            font-size: 15px;
            color: #b13e3e;
            font-weight: 500;
            border-bottom: 1px solid rgba(177, 62, 62, 0.08);
        }

        .result-error-list .error-item:last-child {
            border-bottom: none;
        }

        .result-error-list .error-item::before {
            content: "•";
            font-size: 20px;
            font-weight: 700;
            color: #b13e3e;
        }

        .modal-close-btn {
            display: block;
            margin: 12px auto 0;
            padding: 14px 0;
            width: 80%;
            max-width: 240px;
            background: linear-gradient(135deg, #2d5a9b, #1a3a6b);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.25s;
            box-shadow: 0 8px 20px rgba(26, 58, 107, 0.25);
            letter-spacing: 0.5px;
        }

        .modal-close-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(26, 58, 107, 0.35);
        }

        .modal-close-btn:active {
            transform: translateY(0px);
            box-shadow: 0 4px 12px rgba(26, 58, 107, 0.2);
        }

        @media (max-width: 540px) {
            .card {
                padding: 28px 20px 32px;
            }
            .header h1 {
                font-size: 20px;
            }
            .input-row {
                flex-direction: column;
                align-items: stretch;
            }
            .input-row input {
                min-width: unset;
                font-size: 17px;
                padding: 14px 16px;
            }
            .input-row button {
                padding: 14px;
                width: 100%;
            }
            .modal-box {
                padding: 32px 24px 36px;
            }
            .modal-title {
                font-size: 20px;
            }
            .modal-icon {
                font-size: 40px;
            }
            .spinner-ring {
                width: 60px;
                height: 60px;
            }
            .modal-close-btn {
                width: 90%;
                padding: 12px 0;
            }
        }

        @media (max-width: 400px) {
            .card {
                padding: 20px 14px 24px;
            }
            .header-icon {
                width: 40px;
                height: 40px;
            }
            .header h1 {
                font-size: 18px;
            }
            .result-status {
                font-size: 28px;
                padding: 12px 16px;
            }
            .modal-box {
                padding: 24px 16px 28px;
            }
            .modal-close-btn {
                width: 100%;
            }
        }

        .hidden {
            display: none !important;
        }

        .fade-in {
            animation: fadeSlideUp 0.3s ease forwards;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .empty-placeholder {
            display: none;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <div class="header-icon">
                <svg viewBox="0 0 72.53954 40.34862" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
                    <g transform="translate(-204.0228,-159.53312)">
                        <g stroke-miterlimit="10">
                            <path d="M204.60794,192.54231c0,-7.63249 0,-19.60621 0,-24.32295c0,-0.73574 0,-1.51335 0,-2.28881c0,-3.21719 3.14238,-6.39743 6.66983,-6.39743c0.73146,0 1.47947,0 2.21945,0c8.88629,0 41.82356,0 56.23707,0c4.20072,0 6.82805,2.83503 6.82805,6.88808c0,8.33713 0,21.828 0,26.39854c0,2.99624 -2.70759,6.47686 -7.03613,6.47686c-15.20895,0 -50.4297,0 -58.52587,0c-3.24755,0 -6.3924,-2.79223 -6.3924,-6.7543z" fill="#cccccc" stroke="none" stroke-width="0"/>
                            <path d="M204.0228,193.12745c0,-7.63249 0,-19.60621 0,-24.32295c0,-0.73574 0,-1.51335 0,-2.28881c0,-3.21719 3.14238,-6.39743 6.66984,-6.39743c0.73146,0 1.47947,0 2.21945,0c8.88628,0 41.82356,0 56.23707,0c4.20072,0 6.82805,2.83503 6.82805,6.88808c0,8.33713 0,21.828 0,26.39854c0,2.99624 -2.70758,6.47686 -7.03612,6.47686c-15.20895,0 -50.4297,0 -58.52588,0c-3.24755,0 -6.3924,-2.79223 -6.3924,-6.7543z" fill="#ececec" stroke="none" stroke-width="0"/>
                        </g>
                    </g>
                </svg>
            </div>
            <div>
                <h1>身份证校验 <span class="sub">中国居民 · 18位</span></h1>
            </div>
        </div>

        <div class="input-group">
            <label for="idInput">请输入身份证号码</label>
            <div class="input-row">
                <input
                type="text"
                id="idInput"
                placeholder="例如 11010519491231002X"
                maxlength="18"
                autocomplete="off"
                spellcheck="false"
                />
                <button id="validateBtn">验证</button>
            </div>
        </div>

        <div class="result-area" id="resultArea">
            <div class="result-status idle" id="statusBar"></div>
            <div id="resultContent"></div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <div class="modal-view active" id="viewProgress">
                <svg class="spinner-ring" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#cce1ff"/>
                            <stop offset="100%" stop-color="#cce1ff" stop-opacity="0"/>
                        </linearGradient>
                    </defs>
                    <circle cx="30" cy="30" r="27" fill="none" stroke="url(#ringGrad)" stroke-width="5" stroke-miterlimit="10"/>
                </svg>
                <div class="modal-title">验证中</div>
                <div class="modal-sub">正在校验身份证信息，请稍候...</div>
            </div>

            <div class="modal-view" id="viewSuccess">
                <span class="modal-icon">✅</span>
                <div class="modal-title">验证成功</div>
                <div class="modal-sub">身份证格式有效！</div>
                <div class="modal-detail" id="successDetail">
                    <div class="detail-item">
                        <span class="detail-label">性别</span>
                        <span class="detail-value" id="successGender">男</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">出生日期</span>
                        <span class="detail-value" id="successBirth">1992-03-15</span>
                    </div>
                </div>
                <button class="modal-close-btn" id="closeSuccessBtn">关闭</button>
            </div>

            <div class="modal-view" id="viewError">
                <span class="modal-icon">❌</span>
                <div class="modal-title">验证失败</div>
                <div class="modal-sub">请检查以下问题：</div>
                <div class="result-error-list" id="errorList"></div>
                <button class="modal-close-btn" id="closeErrorBtn">关闭</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            const FACTORS = [7, 9, 10, 5, 8, 4, 2, 1, 6, 3, 7, 9, 10, 5, 8, 4, 2];
            const CHECK_CODES = ['1', '0', 'X', '9', '8', '7', '6', '5', '4', '3', '2'];

            const idInput = document.getElementById('idInput');
            const validateBtn = document.getElementById('validateBtn');
            const statusBar = document.getElementById('statusBar');
            const resultContent = document.getElementById('resultContent');

            const modalOverlay = document.getElementById('modalOverlay');
            const viewProgress = document.getElementById('viewProgress');
            const viewSuccess = document.getElementById('viewSuccess');
            const viewError = document.getElementById('viewError');
            const successGender = document.getElementById('successGender');
            const successBirth = document.getElementById('successBirth');
            const errorList = document.getElementById('errorList');
            const closeSuccessBtn = document.getElementById('closeSuccessBtn');
            const closeErrorBtn = document.getElementById('closeErrorBtn');

            function validateIdNumber(idNumber) {
                const errors = [];
                let birthDate = null;

                if (idNumber.length !== 18) {
                    errors.push('长度不等于18位');
                }

                if (idNumber.length === 18) {
                    const lastChar = idNumber[17];
                    const first17 = idNumber.slice(0, 17);
                    const isFirst17Digits = /^\d{17}$/.test(first17);
                    const isLastValid = /^[\dXx]$/.test(lastChar);

                    if (!isFirst17Digits || !isLastValid) {
                        errors.push('含有非数字的字符');
                    }
                } else {
                    if (!/^[\dXx]*$/.test(idNumber)) {
                        errors.push('含有非数字的字符');
                    }
                }

                if (idNumber.length === 18) {
                    const dateStr = idNumber.slice(6, 14);
                    try {
                        const year = parseInt(dateStr.slice(0, 4), 10);
                        const month = parseInt(dateStr.slice(4, 6), 10);
                        const day = parseInt(dateStr.slice(6, 8), 10);
                        const d = new Date(year, month - 1, day);
                        if (
                            d.getFullYear() !== year ||
                            d.getMonth() !== month - 1 ||
                            d.getDate() !== day
                        ) {
                            throw new Error('Invalid date');
                        }
                        const now = new Date();
                        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                        if (d > today) {
                            errors.push('无效的出生日期');
                        } else {
                            birthDate = d;
                        }
                    } catch (_) {
                        errors.push('无效的出生日期');
                    }
                }

                if (idNumber.length === 18) {
                    if (/^\d{17}$/.test(idNumber.slice(0, 17))) {
                        let totalSum = 0;
                        for (let i = 0; i < 17; i++) {
                            totalSum += FACTORS[i] * parseInt(idNumber[i], 10);
                        }
                        const expectedCode = CHECK_CODES[totalSum % 11];
                        const actualCode = idNumber[17].toUpperCase();
                        if (expectedCode !== actualCode) {
                            errors.push('权位校验错误');
                        }
                    }
                }

                const valid = errors.length === 0;
                const info = {};

                if (valid && idNumber.length === 18) {
                    const genderDigit = parseInt(idNumber[16], 10);
                    info.gender = (genderDigit % 2 === 0) ? '女' : '男';
                    if (birthDate) {
                        info.birthDate = birthDate;
                        info.birthDateStr = formatDate(birthDate);
                    } else {
                        const d = new Date(
                            parseInt(idNumber.slice(6, 10), 10),
                            parseInt(idNumber.slice(10, 12), 10) - 1,
                            parseInt(idNumber.slice(12, 14), 10)
                        );
                        if (!isNaN(d.getTime())) {
                            info.birthDate = d;
                            info.birthDateStr = formatDate(d);
                        }
                    }
                }

                return { valid, errors, info };
            }

            function formatDate(date) {
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            }

            function renderResult(idNumber) {
                resultContent.innerHTML = '';

                if (!idNumber || idNumber.trim() === '') {
                    statusBar.className = 'result-status idle';
                    statusBar.innerHTML = '';
                    return;
                }

                const { valid } = validateIdNumber(idNumber.trim());

                if (valid) {
                    statusBar.className = 'result-status valid';
                    statusBar.innerHTML = `<span class="icon">✅</span>`;
                } else {
                    statusBar.className = 'result-status invalid';
                    statusBar.innerHTML = `<span class="icon">❌</span>`;
                }
            }

            let isVerifying = false;

            function showView(viewId) {
                [viewProgress, viewSuccess, viewError].forEach(v => v.classList.remove('active'));
                document.getElementById(viewId).classList.add('active');
                modalOverlay.classList.add('active');
            }

            function hideModal() {
                modalOverlay.classList.remove('active');
            }

            function showProgressModal() {
                showView('viewProgress');
            }

            function showSuccessModal(info) {
                successGender.textContent = info.gender || '未知';
                successBirth.textContent = info.birthDateStr || '—';
                showView('viewSuccess');
            }

            function showErrorModal(errors) {
                errorList.innerHTML = '';
                errors.forEach(msg => {
                    const item = document.createElement('div');
                    item.className = 'error-item';
                    item.textContent = msg;
                    errorList.appendChild(item);
                });
                showView('viewError');
            }

            function simulateProgress(duration = 1600) {
                return new Promise(resolve => setTimeout(resolve, duration));
            }

            async function handleValidate() {
                const raw = idInput.value;
                const trimmed = raw.trim();

                if (!trimmed) {
                    statusBar.className = 'result-status idle';
                    statusBar.innerHTML = '';
                    resultContent.innerHTML = '';
                    return;
                }

                if (isVerifying) return;
                isVerifying = true;
                validateBtn.disabled = true;
                idInput.disabled = true;

                try {
                    showProgressModal();
                    await simulateProgress(1600);
                    const result = validateIdNumber(trimmed);
                    hideModal();

                    if (result.valid) {
                        showSuccessModal(result.info);
                        renderResult(trimmed);
                    } else {
                        showErrorModal(result.errors);
                        renderResult(trimmed);
                    }
                } catch (err) {
                    hideModal();
                    statusBar.className = 'result-status invalid';
                    statusBar.innerHTML = `<span class="icon">❌</span>`;
                    resultContent.innerHTML = '';
                } finally {
                    isVerifying = false;
                    validateBtn.disabled = false;
                    idInput.disabled = false;
                    idInput.focus();
                }
            }

            validateBtn.addEventListener('click', handleValidate);

            idInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleValidate();
                }
            });

            closeSuccessBtn.addEventListener('click', hideModal);
            closeErrorBtn.addEventListener('click', hideModal);

            modalOverlay.addEventListener('click', function(e) {
                if (e.target === modalOverlay) {
                    const activeView = [viewSuccess, viewError].find(v => v.classList.contains('active'));
                    if (activeView) {
                        hideModal();
                    }
                }
            });

            idInput.addEventListener('input', function() {
                if (!isVerifying) {
                    statusBar.className = 'result-status idle';
                    statusBar.innerHTML = '';
                    resultContent.innerHTML = '';
                }
            });

            (function init() {
                statusBar.className = 'result-status idle';
                statusBar.innerHTML = '';
                resultContent.innerHTML = '';
                [viewProgress, viewSuccess, viewError].forEach(v => v.classList.remove('active'));
            })();

        })();
    </script>

</body>
</html>
